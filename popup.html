<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial;
        width: 300px;
        padding: 10px;
      }
      .url-list {
        width: 100%;
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid #ccc;
        padding: 4px;
      }
      .url-item {
        margin-bottom: 6px;
      }
      .url-item input {
        width: 100%;
      }
      input[type="number"] {
        width: 100%;
        margin-top: 4px;
      }
      button {
        width: 100%;
        margin-top: 6px;
      }
      .small {
        font-size: 12px;
        color: #555;
        margin-top: 4px;
      }
      label {
        display: block;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <h3>Route Reloader</h3>

    <label>URLs (serial numbered)</label>
    <div id="urlList" class="url-list"></div>

    <button id="addUrl">Add URL</button>
    <button id="clearUrls">Clear All URLs</button>

    <label class="small">Max random seconds per route (1 to 300)</label>
    <input id="maxsec" type="number" value="300" min="1" max="300" />

    <label class="small">
      <input type="checkbox" id="activeOnly" /> Reload active tab only
    </label>

    <button id="start">Start / Resume</button>
    <button id="pause">Pause</button>

    <div class="small" id="next"></div>
    <div class="small" id="timer"></div>
    <div class="small" id="count"></div>

    <script src="popup.js"></script>
  </body>
</html>
